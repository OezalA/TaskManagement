name: CD

on:
  push:
    branches: [master]

jobs:
  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-api:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-api:${{ github.sha }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./TaskManagement.Frontend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-frontend:${{ github.sha }}
