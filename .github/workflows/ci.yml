name: CI/CD

on:
  push:
    branches: [dev, master]
  pull_request:
    branches: [dev, master]

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - run: dotnet restore
      - run: dotnet build --no-restore --configuration Release
      - run: dotnet test --no-build --configuration Release

  frontend:
    name: Frontend (Angular)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: TaskManagement.Frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: TaskManagement.Frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test -- --watch=false --browsers=ChromeHeadlessCI

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build

  # CD: only runs after backend + frontend + docker succeed, and only on master push.
  publish:
    name: Publish images to GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase owner
        id: vars
        run: echo "owner=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-api:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-api:${{ github.sha }}

      - name: Build & push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./TaskManagement.Frontend
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-frontend:latest
            ghcr.io/${{ steps.vars.outputs.owner }}/taskmanagement-frontend:${{ github.sha }}
