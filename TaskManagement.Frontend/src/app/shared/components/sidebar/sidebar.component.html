<aside class="sidebar">
  <!-- Logo -->
  <div class="sidebar-logo">
    <div class="logo-icon">T</div>
    <span class="logo-text">TaskFlow</span>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <ng-container *ngFor="let item of navItems">
      <a class="nav-item" [routerLink]="item.path" routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }">
        <!-- Home icon -->
        <svg *ngIf="item.icon === 'home'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <!-- Folder icon -->
        <svg *ngIf="item.icon === 'folder'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
        <!-- Check-square icon -->
        <svg *ngIf="item.icon === 'check-square'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="9 11 12 14 22 4"/>
          <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
        <!-- Users icon -->
        <svg *ngIf="item.icon === 'users'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 00-3-3.87"/>
          <path d="M16 3.13a4 4 0 010 7.75"/>
        </svg>
        <!-- User icon -->
        <svg *ngIf="item.icon === 'user'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <!-- Clock icon -->
        <svg *ngIf="item.icon === 'clock'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <!-- AI/Sparkle icon -->
        <svg *ngIf="item.icon === 'ai'" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2l2.4 7.4H22l-6.2 4.5 2.4 7.4L12 17l-6.2 4.3 2.4-7.4L2 9.4h7.6z"/>
        </svg>
        <span class="nav-label">{{ item.label }}</span>
      </a>
    </ng-container>
  </nav>

  <!-- Bottom user area -->
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="avatar avatar-sm sidebar-avatar">{{ getInitials() }}</div>
      <div class="sidebar-user-info">
        <div class="sidebar-user-name">{{ displayName }}</div>
        <div class="sidebar-user-role">Member</div>
      </div>
    </div>
    <button class="btn-logout" (click)="logout()" title="Logout">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </div>
</aside>
