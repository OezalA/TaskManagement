services:
  frontend:
    build: ./TaskManagement.Frontend
    container_name: taskmanagement_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

  api:
    build: .
    container_name: taskmanagement_api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=taskdb;Username=postgres;Password=postgres
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: taskmanagement_db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
